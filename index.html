<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniel Clements | Linktree</title>
    <!-- Favicon -->
    <link rel="icon" href="/img/Avatar.png" type="image/x-icon" />
    <!-- Font Awesome icons -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.1/css/all.css">
    <!-- Core theme CSS -->
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <!-- Parallax Pixel Background Animation -->
    <section class="animated-background">
      <div id="stars1"></div>
      <div id="stars2"></div>
      <div id="stars3"></div>
    </section>
    <!-- End of Parallax Pixel Background Animation -->

    <a id="profilePicture" href="#popup">
      <img src="/img/Avatar.png" alt="Profile Picture">
    </a>

    <div class="overlay" id="popup">
      <div class="popup">
        <div class="popup-photo">
          <a href="/img/Avatar.png" target="_blank">
            <img src="/img/Avatar.png" alt="Profile Picture">
          </a>
        </div>
        <div class="popup-quote">
          Cloud Systems Administrator
        </div>
        <a class="popup-close" onclick="history.back()">&times;</a>
      </div>
    </div>

    <div id="userName">
      Daniel Clements
    </div>

    <div id="links">
      <a class="link" href="https://www.linkedin.com/in/clementsd/" target="_blank">
        <i class="fab fa-linkedin">&nbsp;</i>Linkedin
      </a>
      <a class="link" href="https://github.com/iamclements" target="_blank">
        <i class="fab fa-github">&nbsp;</i>Github
      </a>
      <a class="link" href="mailto:danie@clements.work" target="_blank">
        <i class="fas fa-envelope">&nbsp;</i>Email
      </a>
    </div>

    <div id="hashtag">
      #MadeWith❤
    </div>
  </body>
</html>
